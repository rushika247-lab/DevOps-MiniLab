name: Docker CI/CD Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Metadata
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "SHA_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build -t rushika2007/todo-app:${VERSION} ./03-dockerized-todo-api
          docker tag rushika2007/todo-app:${VERSION} rushika2007/todo-app:${SHA_TAG}

      - name: Push Docker Images
        run: |
          docker push rushika2007/todo-app:${VERSION}
          docker push rushika2007/todo-app:${SHA_TAG}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          generate_release_notes: true